services:
  postgres:
    image: postgres:16
    container_name: reindr_marketplace_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: reindr
      POSTGRES_PASSWORD: reindr
      POSTGRES_DB: reindr_marketplace
    ports:
      - "5432:5432"
    volumes:
      - reindr_marketplace_pgdata:/var/lib/postgresql/data
      - ./packages/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./packages/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro

volumes:
  reindr_marketplace_pgdata:
